name: CI

on:
  # Feature-branch pushes get typechecked. Pushes to main are handled by
  # publish.yml (which also typechecks), so exclude main here to avoid double runs.
  push:
    branches-ignore: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Typecheck
        run: npm run typecheck
